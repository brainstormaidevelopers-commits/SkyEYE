<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SkyEye // Frictionless Earth</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.110/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.110/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;700;900&display=swap');

    :root {
      --primary: #4ade80;
      --accent: #f9ca24;
      --bg: #000;
      --surface: rgba(10, 10, 10, 0.8);
      --border-color: #4ade80;
      --font-mono: 'Space Mono', monospace;
      --font-ui: 'Inter', sans-serif;
    }

    body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); overflow: hidden; font-family: var(--font-ui); color: var(--primary); }
    #cesiumContainer { width: 100%; height: 100%; position: absolute; top:0; left:0; z-index: 1; }
    
    .cesium-viewer-bottom, .cesium-viewer-toolbar { display: none; }

    /* Neo-Brutalist Global */
    * { box-sizing: border-box; }
    .brutalist-element {
      background: var(--surface);
      border: 2px solid var(--border-color);
      box-shadow: 4px 4px 0 var(--border-color);
      color: var(--primary);
      backdrop-filter: blur(10px);
    }

    /* Locomotion: Top Search Bar */
    #top-nav {
      position: absolute; top: 40px; left: 50%; transform: translateX(-50%);
      z-index: 10; width: 600px; display: flex; flex-direction: column; gap: 5px;
    }
    #omni-search {
      width: 100%; padding: 15px 20px; font-family: var(--font-mono); font-size: 16px;
      font-weight: 700; background: var(--surface); border: 2px solid var(--border-color);
      color: #fff; box-shadow: 4px 4px 0 var(--border-color);
      outline: none;
    }
    .search-hint { font-size: 10px; font-family: var(--font-mono); text-align:center; color: #fff; opacity: 0.6; }

    /* HUD: Locomotion & State */
    .hud-block {
      position: absolute; z-index: 100; pointer-events: none;
      font-family: var(--font-mono); padding: 15px; border-left: 4px solid var(--primary);
      text-transform: uppercase;
    }
    #hud-locomotion { top: 40px; left: 40px; width: 280px; }
    #hud-system { top: 40px; right: 40px; width: 240px; text-align: right; border-left: none; border-right: 4px solid var(--primary); }
    
    .hud-label { font-size: 10px; color: var(--primary); opacity: 0.7; }
    .hud-value { font-size: 15px; font-weight: 900; color: #fff; margin-bottom: 8px; }

    /* Context & Dive Controls */
    #context-card {
      position: absolute; top: 140px; right: 40px; z-index: 10; width: 340px;
      display: none; padding: 20px;
    }
    .context-header { font-weight: 900; font-size: 18px; color:#fff; text-transform: uppercase; }
    .context-meta { font-family: var(--font-mono); font-size: 10px; margin-bottom: 15px; }
    .context-content { font-size: 12px; line-height: 1.6; color: #ddd; margin-bottom: 15px; font-family: var(--font-mono);}
    .action-btn { width: 100%; padding: 12px; font-family:var(--font-mono); font-size: 12px; font-weight: bold; cursor:pointer; margin-top: 5px;}
    .action-btn:hover { background: var(--primary); color: #000; }

    /* Overlay FX (Mode Transitions) */
    #overlay-fx {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 5; display: none;
    }

    /* Bottom Sensor Strip */
    #bottom-control {
      position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
      z-index: 10; display: flex; flex-direction: column; gap: 10px; width: 800px;
    }
    .sensor-strip { display: flex; gap: 5px; justify-content: center; }
    .sensor-btn {
      padding: 10px 15px; font-family: var(--font-mono); font-size: 12px; font-weight: 700;
      cursor: pointer; text-transform: uppercase;
    }
    .sensor-btn.active { background: var(--primary); color: #000; box-shadow: none; transform: translate(2px, 2px); }

    /* Timeline */
    .timeline-bar { display: flex; align-items: center; gap: 10px; padding: 10px 20px; }
    #time-slider { flex: 1; -webkit-appearance: none; background: transparent; height: 4px; border: 1px solid var(--primary); }
    #time-slider::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; background: var(--primary); cursor: pointer; }

  </style>
</head>
<body>

  <div id="cesiumContainer"></div>
  <div id="overlay-fx"></div>

  <!-- HUD: Locomotion -->
  <div id="hud-locomotion" class="hud-block brutalist-element">
    <div class="hud-label">COORDS [LAT/LON/ALT]</div>
    <div id="hud-coords" class="hud-value">00.0000, 00.0000, 0m</div>
    
    <div class="hud-label">VECTOR_STATE [HDG/SPD]</div>
    <div id="hud-vectors" class="hud-value">0° | 0 KMH</div>
    
    <div class="hud-label">MODE</div>
    <div id="hud-mode" class="hud-value" style="color:var(--accent)">AERIAL_ORBIT</div>
  </div>

  <!-- HUD: System Truth -->
  <div id="hud-system" class="hud-block brutalist-element">
    <div class="hud-label">TRUTH_STATE</div>
    <div id="hud-truth" class="hud-value" style="color:#fff">OBSERVED</div>
    
    <div class="hud-label">CONFIDENCE</div>
    <div id="hud-conf" class="hud-value">--%</div>
    
    <div class="hud-label">ENGINE_STATUS</div>
    <div id="hud-status" class="hud-value">ONLINE</div>
  </div>

  <!-- Search & Navigation -->
  <div id="top-nav">
    <input type="text" id="omni-search" placeholder="INPUT_GEOLOCATION_OR_KEYWORD" onkeypress="handleSearch(event)">
    <div class="search-hint">RESOLVE_TARGET_FLY_TO // [ENTER] TO EXECUTE</div>
  </div>

  <!-- Context Card -->
  <div id="context-card" class="brutalist-element">
    <div class="context-header" id="ctx-title">No target</div>
    <div class="context-meta" id="ctx-coords">--/--</div>
    <div id="ctx-content" class="context-content">Select a location to initialize truth-state reassembly.</div>
    <button id="btn-dive" class="brutalist-element action-btn" style="display:none;" onclick="triggerImmersiveDive()">[ IMMERSIVE_DIVE ]</button>
    <button class="brutalist-element action-btn" onclick="document.getElementById('context-card').style.display='none'">[ CLOSE ]</button>
  </div>

  <!-- Bottom Control -->
  <div id="bottom-control">
    <div class="sensor-strip">
       <button class="brutalist-element sensor-btn active" onclick="setSensor('vision', this)">VISION</button>
       <button class="brutalist-element sensor-btn" onclick="setSensor('thermal', this)">THERMAL</button>
       <button class="brutalist-element sensor-btn" onclick="setSensor('radar', this)">SAR</button>
       <button class="brutalist-element sensor-btn" onclick="setSensor('chem', this)">CHEM</button>
       <button class="brutalist-element sensor-btn" onclick="setSensor('seismic', this)">SEISMIC</button>
       <button class="brutalist-element sensor-btn" onclick="toggleLabels()">TAGS</button>
    </div>
    <div class="brutalist-element timeline-bar">
       <span style="font-size:10px; font-family:var(--font-mono)">HISTORY</span>
       <input type="range" id="time-slider" min="0" max="100" value="100">
       <span id="time-display" style="font-size:10px; font-family:var(--font-mono)">LIVE_STREAM</span>
    </div>
  </div>

  <script>
    Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJjOTVhZGI5Zi0wMTYzLTQ2MWEtYTBjYS02OTc5ZGNkNTY3ZDMiLCJpZCI6NTcwNzEsImlhdCI6MTc2MjQ3OTkyNH0.1bx7V2IFDE_Id5uqrQx-pJvRlzH34NDa2zc8vDY-Y0w';
    
    let viewer;
    const SKYEYE_CONFIG = { API_BASE: 'http://localhost:5050' };

    // --- LOCOMOTION SPINE: GROUND CONTROL ENGINE ---
    const GroundControl = {
       active: false,
       handler: null,
       activeKeys: new Set(),
       
       enable() {
          if (this.active) return;
          this.active = true;
          viewer.scene.screenSpaceCameraController.enableRotate = false;
          viewer.scene.screenSpaceCameraController.enableTranslate = false;
          viewer.scene.screenSpaceCameraController.enableZoom = false;
          viewer.scene.screenSpaceCameraController.enableTilt = false;
          viewer.scene.screenSpaceCameraController.enableLook = false;
          
          this.setupInput();
          document.getElementById('hud-mode').innerText = 'GROUND_OPS';
          document.getElementById('hud-mode').style.color = '#4ade80';
          document.getElementById('btn-dive').innerText = '[ LIFT_OFF ]';
       },
       
       disable() {
          if (!this.active) return;
          this.active = false;
          viewer.scene.screenSpaceCameraController.enableRotate = true;
          viewer.scene.screenSpaceCameraController.enableTranslate = true;
          viewer.scene.screenSpaceCameraController.enableZoom = true;
          viewer.scene.screenSpaceCameraController.enableTilt = true;
          viewer.scene.screenSpaceCameraController.enableLook = true;
          
          if (this.handler) this.handler.destroy();
          window.removeEventListener('keydown', this.handleKeyDown);
          window.removeEventListener('keyup', this.handleKeyUp);
          document.getElementById('hud-mode').innerText = 'AERIAL_ORBIT';
          document.getElementById('hud-mode').style.color = 'var(--accent)';
          document.getElementById('btn-dive').innerText = '[ IMMERSIVE_DIVE ]';
       },
       
       setupInput() {
          this.handler = new Cesium.ScreenSpaceEventHandler(viewer.canvas);
          
          // MOUSE LOOK (Delta-based)
          this.handler.setInputAction((movement) => {
             const lookFactor = 0.005;
             viewer.camera.lookRight((movement.endPosition.x - movement.startPosition.x) * lookFactor);
             viewer.camera.lookUp((movement.startPosition.y - movement.endPosition.y) * lookFactor);
          }, Cesium.ScreenSpaceEventType.MOUSE_MOVE);

          // CONTINUOUS WASD MOVEMENT
          this.handleKeyDown = (e) => { this.activeKeys.add(e.key.toLowerCase()); };
          this.handleKeyUp = (e) => { this.activeKeys.delete(e.key.toLowerCase()); };
          window.addEventListener('keydown', this.handleKeyDown);
          window.addEventListener('keyup', this.handleKeyUp);
          
          const moveTick = () => {
             if (!this.active) return;
             const moveAmount = 2.0;
             if (this.activeKeys.has('w')) viewer.camera.moveForward(moveAmount);
             if (this.activeKeys.has('s')) viewer.camera.moveBackward(moveAmount);
             if (this.activeKeys.has('a')) viewer.camera.moveLeft(moveAmount);
             if (this.activeKeys.has('d')) viewer.camera.moveRight(moveAmount);
             if (this.activeKeys.has('q')) viewer.camera.moveUp(moveAmount);
             if (this.activeKeys.has('e')) viewer.camera.moveDown(moveAmount);
             requestAnimationFrame(moveTick);
          };
          moveTick();
       }
    };

    (async () => {
       try {
          const terrain = await Cesium.createWorldTerrainAsync();
          viewer = new Cesium.Viewer('cesiumContainer', {
             terrainProvider: terrain,
             baseLayerPicker: false, geocoder: false, homeButton: false, sceneModePicker: false,
             navigationHelpButton: false, animation: false, timeline: false, fullscreenButton: false,
             infoBox: false, selectionIndicator: false,
             skyBox: new Cesium.SkyBox({
                sources: {
                  positiveX: Cesium.buildModuleUrl('Assets/Textures/SkyBox/tycho800_px.jpg'),
                  negativeX: Cesium.buildModuleUrl('Assets/Textures/SkyBox/tycho800_mx.jpg'),
                  positiveY: Cesium.buildModuleUrl('Assets/Textures/SkyBox/tycho800_py.jpg'),
                  negativeY: Cesium.buildModuleUrl('Assets/Textures/SkyBox/tycho800_my.jpg'),
                  positiveZ: Cesium.buildModuleUrl('Assets/Textures/SkyBox/tycho800_pz.jpg'),
                  negativeZ: Cesium.buildModuleUrl('Assets/Textures/SkyBox/tycho800_mz.jpg')
                }
             })
          });
          
          initApp();
       } catch(e) { console.error(e); }
    })();

    function initApp() {
       viewer.clock.onTick.addEventListener(updateHUD);
       
       // Descent Trigger
       viewer.camera.changed.addEventListener(() => {
          const height = viewer.camera.positionCartographic.height;
          const diveBtn = document.getElementById('btn-dive');
          if (height < 2000) diveBtn.style.display = 'block';
          else diveBtn.style.display = 'none';

          if (height < 300) {
             document.getElementById('overlay-fx').style.display = 'block';
             document.getElementById('overlay-fx').style.backgroundImage = 'radial-gradient(circle, transparent 20%, rgba(74, 222, 128, 0.05) 100%)';
          } else {
             document.getElementById('overlay-fx').style.display = 'none';
          }
       });
    }

    async function handleSearch(e) {
       if (e.key === 'Enter') {
          const query = e.target.value.trim();
          if(!query) return;
          try {
             const geocoder = new Cesium.IonGeocoderService();
             const results = await geocoder.geocode(query);
             if (results && results.length > 0) {
                const dest = results[0].destination;
                viewer.camera.flyTo({ destination: dest, duration: 3.0 });
                setTimeout(() => resolveContext(query, dest), 3200);
             }
          } catch(err) { console.error(err); }
       }
    }

    function resolveContext(title, dest) {
       let lat, lon;
       if (dest instanceof Cesium.Rectangle) {
          const center = Cesium.Rectangle.center(dest);
          lat = Cesium.Math.toDegrees(center.latitude);
          lon = Cesium.Math.toDegrees(center.longitude);
       } else {
          const carto = Cesium.Ellipsoid.WGS84.cartesianToCartographic(dest);
          lat = Cesium.Math.toDegrees(carto.latitude);
          lon = Cesium.Math.toDegrees(carto.longitude);
       }
       showContextCard(title, lat, lon);
    }

    async function showContextCard(title, lat, lon) {
       document.getElementById('context-card').style.display = 'block';
       document.getElementById('ctx-title').innerText = title.toUpperCase();
       document.getElementById('ctx-coords').innerText = `${lat.toFixed(4)}°, ${lon.toFixed(4)}°`;
       
       try {
          const res = await fetch(`${SKYEYE_CONFIG.API_BASE}/reconstruct?lat=${lat}&lon=${lon}`);
          const data = await res.json();
          document.getElementById('ctx-content').innerHTML = `TRUTH_STATE: ${data.mode || 'FUSED'}<br>CONFIDENCE: ${((data.physics_consistency || 0.98)*100).toFixed(0)}%<br>Last observed: ${new Date().toLocaleTimeString()}`;
          document.getElementById('hud-truth').innerText = data.mode || 'FUSED';
          document.getElementById('hud-conf').innerText = `${((data.physics_consistency || 0.98)*100).toFixed(0)}%`;
       } catch(e) {
          document.getElementById('ctx-content').innerHTML = `OFFLINE_ESTIMATE_READY<br>Using baseline photogrammetry cache.`;
       }
    }

    function triggerImmersiveDive() {
       const carto = viewer.camera.positionCartographic;
       if (GroundControl.active || carto.height < 150) {
          GroundControl.disable();
          viewer.camera.flyTo({
             destination: Cesium.Cartesian3.fromRadians(carto.longitude, carto.latitude, 25000),
             orientation: { pitch: Cesium.Math.toRadians(-90), heading: 0, roll: 0 },
             duration: 3.0
          });
       } else {
          viewer.camera.flyTo({
             destination: Cesium.Cartesian3.fromRadians(carto.longitude, carto.latitude, 15),
             orientation: { pitch: Cesium.Math.toRadians(-5), heading: viewer.camera.heading, roll: 0 },
             duration: 3.5,
             complete: () => { GroundControl.enable(); }
          });
       }
    }

    function updateHUD() {
       const carto = viewer.camera.positionCartographic;
       document.getElementById('hud-coords').innerText = 
          `${Cesium.Math.toDegrees(carto.latitude).toFixed(6)}°, ${Cesium.Math.toDegrees(carto.longitude).toFixed(6)}°, ${carto.height.toFixed(0)}m`;
       document.getElementById('hud-vectors').innerText = `${Cesium.Math.toDegrees(viewer.camera.heading).toFixed(0)}° | ${((carto.height/1000)).toFixed(1)} KM/S_REL`;
    }

    let labelsEnabled = false;
    let labelLayer = null;
    function toggleLabels() {
       if (!labelsEnabled) {
          labelLayer = viewer.imageryLayers.addImageryProvider(new Cesium.IonImageryProvider({ assetId: 3 })); // Labels
          labelsEnabled = true;
       } else {
          viewer.imageryLayers.remove(labelLayer);
          labelsEnabled = false;
       }
    }

    function setSensor(mode, btn) {
       document.querySelectorAll('.sensor-btn').forEach(b => b.classList.remove('active'));
       btn.classList.add('active');
       // Logic for sensor post-processing/layers would go here, simplified for spine focus.
    }

  </script>
</body>
</html>
